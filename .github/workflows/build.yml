name: Build Khallas APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Khallas

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Point Gradle at the pre-installed Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Download Gradle and generate wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.7/bin/gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: khallas-debug-apk
          path: Khallas/app/build/outputs/apk/debug/*.apk
